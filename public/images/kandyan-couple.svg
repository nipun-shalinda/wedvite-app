<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <style>
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes glow { 0%,100%{opacity:0.15} 50%{opacity:0.35} }
    @keyframes sparkle { 0%,100%{opacity:0;transform:scale(0.5)} 50%{opacity:1;transform:scale(1)} }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.7} }
    @keyframes sway { 0%,100%{transform:rotate(-1deg)} 50%{transform:rotate(1deg)} }
    .couple{animation:float 3s ease-in-out infinite}
    .aura{animation:glow 2.5s ease-in-out infinite}
    .spark{animation:sparkle 2s ease-in-out infinite}
    .heart-pulse{animation:pulse 1.8s ease-in-out infinite}
    .saree-flow{animation:sway 4s ease-in-out infinite;transform-origin:center bottom}
  </style>

  <!-- Background aura -->
  <ellipse class="aura" cx="150" cy="220" rx="120" ry="160" fill="url(#auraGrad)"/>

  <defs>
    <radialGradient id="auraGrad" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#d4a017" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4a017" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="faceGrad" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#f5d0a9"/>
      <stop offset="100%" stop-color="#e8b88a"/>
    </radialGradient>
  </defs>

  <g class="couple">
    <!-- === GROOM (left) === -->
    <g transform="translate(85, 95)">
      <!-- Body / National dress (white) -->
      <path d="M10 110 Q30 95 50 110 L55 200 Q30 210 5 200 Z" fill="#f5f0e0" stroke="#d4a017" stroke-width="0.8" opacity="0.9"/>
      <!-- Gold sash -->
      <path d="M15 115 Q30 108 48 115 L45 130 Q30 122 18 130 Z" fill="#d4a017" opacity="0.7"/>
      <!-- Neck -->
      <rect x="22" y="90" width="16" height="15" rx="5" fill="#e8b88a"/>
      <!-- Head -->
      <ellipse cx="30" cy="75" rx="22" ry="26" fill="url(#faceGrad)"/>
      <!-- Hair -->
      <ellipse cx="30" cy="60" rx="20" ry="14" fill="#1a0a00"/>
      <!-- Kandyan headdress -->
      <path d="M12 58 Q30 42 48 58" fill="none" stroke="#d4a017" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="30" cy="48" r="4" fill="#d4a017" opacity="0.8"/>
      <circle cx="20" cy="53" r="2" fill="#d4a017" opacity="0.6"/>
      <circle cx="40" cy="53" r="2" fill="#d4a017" opacity="0.6"/>
      <!-- Eyes -->
      <ellipse cx="23" cy="74" rx="2.5" ry="2" fill="#1a0a00"/>
      <ellipse cx="37" cy="74" rx="2.5" ry="2" fill="#1a0a00"/>
      <!-- Smile -->
      <path d="M24 82 Q30 87 36 82" fill="none" stroke="#c47a5a" stroke-width="1.2" stroke-linecap="round"/>
      <!-- Arm reaching to bride -->
      <path d="M50 130 Q65 125 75 135" fill="none" stroke="#e8b88a" stroke-width="6" stroke-linecap="round"/>
    </g>

    <!-- === BRIDE (right) === -->
    <g class="saree-flow" transform="translate(155, 95)">
      <!-- Saree body (deep red/maroon) -->
      <path d="M-5 110 Q25 90 55 110 L60 210 Q25 220 -10 210 Z" fill="#8b1a2b" stroke="#d4a017" stroke-width="0.8" opacity="0.9"/>
      <!-- Saree pallu (draped over shoulder) -->
      <path d="M40 110 Q55 100 50 130 Q45 150 55 170" fill="none" stroke="#d4a017" stroke-width="2" opacity="0.5"/>
      <!-- Gold border on saree -->
      <path d="M-8 205 Q25 215 58 205" fill="none" stroke="#d4a017" stroke-width="3" opacity="0.6"/>
      <path d="M-6 200 Q25 210 56 200" fill="none" stroke="#d4a017" stroke-width="1.5" opacity="0.4"/>
      <!-- Blouse -->
      <path d="M5 110 Q25 100 45 110 L42 125 Q25 118 8 125 Z" fill="#a01030" stroke="#d4a017" stroke-width="0.5"/>
      <!-- Neck -->
      <rect x="18" y="90" width="14" height="14" rx="5" fill="#e8b88a"/>
      <!-- Gold necklace -->
      <path d="M15 105 Q25 112 35 105" fill="none" stroke="#d4a017" stroke-width="2" stroke-linecap="round"/>
      <circle cx="25" cy="112" r="3" fill="#d4a017" opacity="0.8"/>
      <!-- Head -->
      <ellipse cx="25" cy="74" rx="21" ry="25" fill="url(#faceGrad)"/>
      <!-- Hair (long, dark) -->
      <ellipse cx="25" cy="58" rx="19" ry="14" fill="#0d0500"/>
      <path d="M6 62 Q5 90 10 110" fill="#0d0500" opacity="0.7"/>
      <path d="M44 62 Q45 90 40 110" fill="#0d0500" opacity="0.7"/>
      <!-- Hair ornament / flowers -->
      <circle cx="8" cy="65" r="4" fill="#d4a017" opacity="0.7"/>
      <circle cx="6" cy="75" r="3" fill="#c9184a" opacity="0.6"/>
      <circle cx="8" cy="85" r="3.5" fill="#d4a017" opacity="0.5"/>
      <!-- Maang tikka (forehead jewelry) -->
      <circle cx="25" cy="55" r="3" fill="#d4a017"/>
      <line x1="25" y1="55" x2="25" y2="62" stroke="#d4a017" stroke-width="1" opacity="0.6"/>
      <!-- Eyes -->
      <ellipse cx="19" cy="73" rx="2.5" ry="2" fill="#1a0a00"/>
      <ellipse cx="33" cy="73" rx="2.5" ry="2" fill="#1a0a00"/>
      <!-- Bindi -->
      <circle cx="26" cy="66" r="1.5" fill="#c9184a"/>
      <!-- Smile -->
      <path d="M19 81 Q25 86 31 81" fill="none" stroke="#c47a5a" stroke-width="1.2" stroke-linecap="round"/>
      <!-- Arm reaching to groom -->
      <path d="M0 130 Q-10 125 -20 135" fill="none" stroke="#e8b88a" stroke-width="5.5" stroke-linecap="round"/>
      <!-- Bangles -->
      <circle cx="-18" cy="133" r="4" fill="none" stroke="#d4a017" stroke-width="1.5" opacity="0.7"/>
    </g>

    <!-- Joined hands (center) -->
    <ellipse cx="150" cy="233" rx="10" ry="6" fill="#e8b88a" opacity="0.8"/>

    <!-- Heart between them -->
    <g class="heart-pulse" transform="translate(141, 175)">
      <path d="M9 3 C9 0 5 -2 3 1 C1 -2 -3 0 -3 3 C-3 7 3 12 3 12 C3 12 9 7 9 3 Z"
        fill="#c9184a" transform="scale(1.3)" opacity="0.6"/>
    </g>

    <!-- === PORUWA PLATFORM === -->
    <path d="M60 305 L240 305 L230 315 L70 315 Z" fill="#d4a017" opacity="0.4"/>
    <path d="M70 300 L230 300 L235 305 L65 305 Z" fill="#d4a017" opacity="0.3"/>
    <!-- Poruwa decorative edge -->
    <path d="M80 300 Q90 295 100 300 Q110 295 120 300 Q130 295 140 300 Q150 295 160 300 Q170 295 180 300 Q190 295 200 300 Q210 295 220 300"
      fill="none" stroke="#d4a017" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Sparkles around couple -->
  <circle class="spark" cx="60" cy="120" r="2" fill="#d4a017" style="animation-delay:0s"/>
  <circle class="spark" cx="240" cy="100" r="2.5" fill="#d4a017" style="animation-delay:0.5s"/>
  <circle class="spark" cx="45" cy="200" r="1.5" fill="#d4a017" style="animation-delay:1s"/>
  <circle class="spark" cx="255" cy="190" r="2" fill="#d4a017" style="animation-delay:1.5s"/>
  <circle class="spark" cx="100" cy="80" r="1.5" fill="#d4a017" style="animation-delay:0.7s"/>
  <circle class="spark" cx="210" cy="75" r="2" fill="#d4a017" style="animation-delay:1.2s"/>
  <circle class="spark" cx="70" cy="280" r="1.5" fill="#d4a017" style="animation-delay:0.3s"/>
  <circle class="spark" cx="230" cy="270" r="2" fill="#d4a017" style="animation-delay:0.8s"/>

  <!-- Floating lotus petals -->
  <text class="spark" x="50" y="160" font-size="12" opacity="0.3" style="animation-delay:0.4s">🪷</text>
  <text class="spark" x="235" y="150" font-size="10" opacity="0.25" style="animation-delay:1.1s">🪷</text>
  <text class="spark" x="140" y="340" font-size="11" opacity="0.3" style="animation-delay:0.9s">🪷</text>
</svg>
