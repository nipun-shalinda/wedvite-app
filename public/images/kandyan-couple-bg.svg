<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700" fill="none" opacity="0.12">
  <style>
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes glow{0%,100%{opacity:.08}50%{opacity:.18}}
    @keyframes sparkle{0%,100%{opacity:0;transform:scale(.3)}50%{opacity:.8;transform:scale(1)}}
    @keyframes sway{0%,100%{transform:rotate(-.5deg)}50%{transform:rotate(.5deg)}}
    .couple{animation:float 4s ease-in-out infinite}
    .aura{animation:glow 3s ease-in-out infinite}
    .spark{animation:sparkle 2.5s ease-in-out infinite}
    .bride{animation:sway 5s ease-in-out infinite;transform-origin:center bottom}
  </style>
  <ellipse class="aura" cx="250" cy="350" rx="200" ry="280" fill="#d4a017"/>
  <g class="couple" transform="translate(100,80)">
    <!-- Groom -->
    <g transform="translate(80,120)">
      <path d="M15 160 Q50 140 85 160 L90 310 Q50 325 10 310Z" fill="#f5f0e0" stroke="#d4a017" stroke-width="1"/>
      <path d="M22 168 Q50 155 78 168 L74 190 Q50 178 26 190Z" fill="#d4a017" opacity=".6"/>
      <rect x="36" y="130" width="28" height="22" rx="8" fill="#e8b88a"/>
      <ellipse cx="50" cy="105" rx="35" ry="40" fill="#e8b88a"/>
      <ellipse cx="50" cy="80" rx="32" ry="22" fill="#1a0a00"/>
      <path d="M18 82 Q50 58 82 82" fill="none" stroke="#d4a017" stroke-width="4" stroke-linecap="round"/>
      <circle cx="50" cy="65" r="6" fill="#d4a017" opacity=".7"/>
      <circle cx="32" cy="73" r="3.5" fill="#d4a017" opacity=".5"/>
      <circle cx="68" cy="73" r="3.5" fill="#d4a017" opacity=".5"/>
      <ellipse cx="38" cy="103" rx="4" ry="3.5" fill="#1a0a00"/>
      <ellipse cx="62" cy="103" rx="4" ry="3.5" fill="#1a0a00"/>
      <path d="M40 115 Q50 122 60 115" fill="none" stroke="#c47a5a" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M85 195 Q110 185 125 200" fill="none" stroke="#e8b88a" stroke-width="9" stroke-linecap="round"/>
    </g>
    <!-- Bride -->
    <g class="bride" transform="translate(195,120)">
      <path d="M-10 160 Q40 130 90 160 L95 320 Q40 340 -15 320Z" fill="#8b1a2b" stroke="#d4a017" stroke-width="1"/>
      <path d="M65 160 Q88 145 82 195 Q75 230 90 260" fill="none" stroke="#d4a017" stroke-width="3" opacity=".4"/>
      <path d="M-12 312 Q40 330 92 312" fill="none" stroke="#d4a017" stroke-width="5" opacity=".5"/>
      <path d="M-8 305 Q40 322 88 305" fill="none" stroke="#d4a017" stroke-width="2.5" opacity=".3"/>
      <path d="M8 160 Q40 145 72 160 L68 182 Q40 170 12 182Z" fill="#a01030" stroke="#d4a017" stroke-width=".8"/>
      <rect x="28" y="130" width="24" height="22" rx="8" fill="#e8b88a"/>
      <path d="M22 155 Q40 165 58 155" fill="none" stroke="#d4a017" stroke-width="3" stroke-linecap="round"/>
      <circle cx="40" cy="165" r="5" fill="#d4a017" opacity=".7"/>
      <ellipse cx="40" cy="103" rx="34" ry="40" fill="#e8b88a"/>
      <ellipse cx="40" cy="78" rx="30" ry="22" fill="#0d0500"/>
      <path d="M10 85 Q8 125 15 160" fill="#0d0500" opacity=".6"/>
      <path d="M70 85 Q72 125 65 160" fill="#0d0500" opacity=".6"/>
      <circle cx="12" cy="90" r="6" fill="#d4a017" opacity=".6"/>
      <circle cx="10" cy="105" r="5" fill="#c9184a" opacity=".5"/>
      <circle cx="12" cy="120" r="5.5" fill="#d4a017" opacity=".4"/>
      <circle cx="40" cy="72" r="5" fill="#d4a017"/>
      <line x1="40" y1="72" x2="40" y2="82" stroke="#d4a017" stroke-width="1.5" opacity=".5"/>
      <ellipse cx="30" cy="101" rx="4" ry="3.5" fill="#1a0a00"/>
      <ellipse cx="52" cy="101" rx="4" ry="3.5" fill="#1a0a00"/>
      <circle cx="41" cy="90" r="2.5" fill="#c9184a"/>
      <path d="M30 113 Q40 120 50 113" fill="none" stroke="#c47a5a" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M-5 195 Q-18 185 -30 200" fill="none" stroke="#e8b88a" stroke-width="8" stroke-linecap="round"/>
      <circle cx="-28" cy="198" r="6" fill="none" stroke="#d4a017" stroke-width="2" opacity=".6"/>
    </g>
    <!-- Joined hands -->
    <ellipse cx="250" cy="325" rx="16" ry="9" fill="#e8b88a" opacity=".7"/>
    <!-- Poruwa -->
    <path d="M50 450 L450 450 L430 465 L70 465Z" fill="#d4a017" opacity=".35"/>
    <path d="M70 442 L430 442 L440 450 L60 450Z" fill="#d4a017" opacity=".25"/>
    <path d="M90 442 Q110 435 130 442 Q150 435 170 442 Q190 435 210 442 Q230 435 250 442 Q270 435 290 442 Q310 435 330 442 Q350 435 370 442 Q390 435 410 442"
      fill="none" stroke="#d4a017" stroke-width="1.5" opacity=".4"/>
  </g>
  <!-- Sparkles -->
  <circle class="spark" cx="50" cy="150" r="3" fill="#d4a017" style="animation-delay:0s"/>
  <circle class="spark" cx="450" cy="130" r="4" fill="#d4a017" style="animation-delay:.6s"/>
  <circle class="spark" cx="40" cy="350" r="2.5" fill="#d4a017" style="animation-delay:1.1s"/>
  <circle class="spark" cx="460" cy="340" r="3" fill="#d4a017" style="animation-delay:1.6s"/>
  <circle class="spark" cx="80" cy="550" r="2.5" fill="#d4a017" style="animation-delay:.3s"/>
  <circle class="spark" cx="420" cy="530" r="3" fill="#d4a017" style="animation-delay:.9s"/>
  <circle class="spark" cx="250" cy="80" r="3" fill="#d4a017" style="animation-delay:1.3s"/>
  <circle class="spark" cx="150" cy="600" r="2" fill="#d4a017" style="animation-delay:.5s"/>
  <circle class="spark" cx="350" cy="620" r="2.5" fill="#d4a017" style="animation-delay:1.8s"/>
</svg>
